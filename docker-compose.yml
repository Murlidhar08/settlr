services:
  settlr:
    container_name: settlr
    image: settlr:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      # Application
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=Settlr
      - NEXT_PUBLIC_APP_DESCRIPTION=Settlr for managing personal finance

      # Better Auth
      - BETTER_AUTH_SECRET=dummy_secret_replace_me_with_32_chars_long
      - BETTER_AUTH_URL=http://settlr.example.com
      - BETTER_AUTH_TRUSTED_ORIGINS=http://settlr.example.com,http://*.settlr.example.com

      # Database
      - DATABASE_URL=postgresql://user:password@host:5432/database

      # Email Service
      - SMTP_HOST=mail.example.com
      - SMTP_PORT=587
      - SMTP_USER=user@example.com
      - SMTP_PASS=password
      - SMTP_SECURE=false
      - FROM_EMAIL=settlr@example.com

      # Google login
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=

      # Discord
      - DISCORD_CLIENT_ID=
      - DISCORD_CLIENT_SECRET=
    restart: unless-stopped
